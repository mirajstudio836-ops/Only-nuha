<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuha 💕</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- First Screen -->
        <div id="firstScreen" class="screen active">
            <div class="heart-float"></div>
            <div class="love-text">You Love Me Nuha?</div>
            <div class="yes-no-container">
                <button id="yesBtn" class="choice-btn yes-btn">Yes 😍</button>
                <button id="noBtn" class="choice-btn no-btn">No</button>
            </div>
        </div>

        <!-- Second Screen -->
        <div id="secondScreen" class="screen">
            <div class="love-confession">
                <div class="text-line">Nuha</div>
                <div class="text-line">আমিও তোমাকে ভালোবাসি 💕</div>
                <div class="text-line">তুমি আমার সাথে সারা জীবন থেকে যাবে?</div>
            </div>
            <div class="lover-heart">
                <span class="lover-text">Lover</span>
                <span class="lover-names">Nuha + Miraj</span>
            </div>
        </div>

        <!-- Final Screen -->
        <div id="finalScreen" class="screen">
            <div class="final-content">
                <div class="floating-nuha">
                    <span class="nuha-name">N</span><span class="nuha-name">u</span><span class="nuha-name">h</span><span class="nuha-name">a</span>
                </div>
                <div class="final-love">Forever Together 💖</div>
                <div class="couple-names">Nuha + Miraj</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
